services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d tracker"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  db_backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: tracker
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups
    networks:
      - backend

  learning-api:
    build:
      context: ../..
      dockerfile: document-projects/learning-tracker/docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - chroma_data:/projects/document-projects/learning-tracker/chroma_data
    networks:
      - gateway_net
      - backend

networks:
  gateway_net:
    external: true  # shared with Cloudflare tunnel
  backend:
    internal: true  # DB isolation — no external routing

volumes:
  postgres_data:
  chroma_data:
