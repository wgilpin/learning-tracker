[project]
name = "documentlm-core"
version = "0.1.0"
description = "Shared engine: DB models, services, and ADK agents"
requires-python = ">=3.13"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "pydantic>=2.0",
    "pgvector>=0.3",
    "asyncpg>=0.29",
    "httpx>=0.27",
    "google-adk>=0.3",
    "pydantic-settings>=2.0",
    "chromadb>=0.6",
    "nlp-utils",
    "wikipedia>=1.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
    "mypy>=1.13",
    "ruff>=0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/documentlm_core"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
env = [
    "TEST_DATABASE_URL=postgresql+asyncpg://tracker:tracker@localhost:5434/tracker_test",
]
