[project]
name = "documentlm-core"
version = "0.1.0"
description = "Shared engine: DB models, services, and ADK agents"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "pydantic>=2.0",
    "pgvector>=0.3",
    "asyncpg>=0.29",
    "httpx>=0.27",
    "google-adk>=0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
    "mypy>=1.13",
    "ruff>=0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/documentlm_core"]
