# Run DB in Docker, app locally.
# Usage: ./dev.sh
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db_backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: tracker
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracker_test
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  postgres_data:
