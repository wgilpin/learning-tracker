<li id="child-{{ item_id }}" class="syllabus-child syllabus-child--editing">
  {% if error %}
  <p class="form-error">{{ error }}</p>
  {% endif %}
  <form hx-patch="/syllabus-items/{{ item_id }}"
        hx-target="#child-{{ item_id }}"
        hx-swap="outerHTML">
    <div class="form-field">
      <input type="text" name="title" value="{{ title }}" required placeholder="Chapter title" autofocus>
    </div>
    <div class="form-field">
      <textarea name="description" rows="2" placeholder="Description…">{{ description }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary btn-sm">Save</button>
      <button type="button" class="btn-secondary btn-sm"
              hx-get="/syllabus-items/{{ item_id }}/restore"
              hx-target="#child-{{ item_id }}"
              hx-swap="outerHTML">
        Cancel
      </button>
    </div>
  </form>
</li>
