<li class="syllabus-child{% if child.status == 'MASTERED' %} is-done{% endif %}{% if child.id == lesson_id %} is-active{% endif %}" id="child-{{ child.id }}">
  {% if duplicate_warning %}
  <p class="warning-banner">A chapter with this title already exists in this section.</p>
  {% endif %}
  <input type="checkbox"
         {% if child.status == 'MASTERED' %}checked{% endif %}
         hx-patch="/syllabus-items/{{ child.id }}/status"
         hx-target="#child-{{ child.id }}"
         hx-swap="outerHTML"
         hx-vals='js:{status: event.target.checked ? "MASTERED" : "UNRESEARCHED"}'
         hx-trigger="change">
  {% if is_leaf %}
  <button class="syllabus-child-btn" data-opens-chapter="true"
          hx-get="/syllabus-items/{{ child.id }}/chapter"
          hx-target="#reading-panel"
          hx-swap="innerHTML"
          hx-push-url="/topics/{{ topic_slug }}?lesson={{ child.slug }}">
    {% if not has_chapter %}<em>{{ child.title }}</em>{% else %}{{ child.title }}{% endif %}
    {% if child.description %}<span class="syllabus-child-desc">{{ child.description }}</span>{% endif %}
    {% if quiz_passed_map is defined and quiz_passed_map.get(child.id) == true %}
      <span class="quiz-pass-badge" title="Quiz passed" aria-label="Quiz passed">✓</span>
    {% endif %}
  </button>
  {% else %}
  <button class="syllabus-child-btn{% if child.id in ancestor_ids %} is-open{% endif %}"
          hx-get="/syllabus-items/{{ child.id }}/children{% if lesson_id %}?lesson={{ lesson_id }}&topic_slug={{ topic_slug }}{% elif topic_slug %}?topic_slug={{ topic_slug }}{% endif %}"
          hx-target="#children-{{ child.id }}"
          hx-swap="innerHTML">
    <span class="syllabus-chevron">▶</span>
    {{ child.title }}
    {% if child.description %}<span class="syllabus-child-desc">{{ child.description }}</span>{% endif %}
  </button>
  <ul class="syllabus-children" id="children-{{ child.id }}"
      {% if child.id in ancestor_ids %}
      hx-get="/syllabus-items/{{ child.id }}/children?lesson={{ lesson_id }}&topic_slug={{ topic_slug }}"
      hx-trigger="load"
      hx-swap="innerHTML"
      {% endif %}></ul>
  {% endif %}
  <span class="syllabus-child-actions">
    <button class="btn-icon"
            title="Edit"
            hx-get="/syllabus-items/{{ child.id }}/edit-form"
            hx-target="#child-{{ child.id }}"
            hx-swap="outerHTML">✎</button>
    <button class="btn-icon btn-icon--danger"
            title="Delete"
            hx-get="/syllabus-items/{{ child.id }}/delete-confirm"
            hx-target="#child-{{ child.id }}"
            hx-swap="outerHTML">✕</button>
  </span>
</li>
