<li class="syllabus-child{% if child.status == 'MASTERED' %} is-done{% endif %}" id="child-{{ child.id }}">
  <input type="checkbox"
         {% if child.status == 'MASTERED' %}checked{% endif %}
         hx-patch="/syllabus-items/{{ child.id }}/status"
         hx-target="#child-{{ child.id }}"
         hx-swap="outerHTML"
         hx-vals='js:{status: event.target.checked ? "MASTERED" : "UNRESEARCHED"}'
         hx-trigger="change">
  {% if is_leaf %}
  <button class="syllabus-child-btn"
          hx-get="/syllabus-items/{{ child.id }}/chapter"
          hx-target="#reading-panel"
          hx-swap="innerHTML"
          hx-push-url="/topics/{{ child.topic_id }}?lesson={{ child.id }}">
    {{ child.title }}
    {% if child.description %}<span class="syllabus-child-desc">{{ child.description }}</span>{% endif %}
  </button>
  {% else %}
  <button class="syllabus-child-btn"
          hx-get="/syllabus-items/{{ child.id }}/children"
          hx-target="#children-{{ child.id }}"
          hx-swap="innerHTML">
    <span class="syllabus-chevron">▶</span>
    {{ child.title }}
    {% if child.description %}<span class="syllabus-child-desc">{{ child.description }}</span>{% endif %}
  </button>
  <ul class="syllabus-children" id="children-{{ child.id }}"></ul>
  {% endif %}
</li>
