<div class="margin-comment {% if comment.status == 'RESOLVED' %}resolved{% else %}open{% endif %}"
     id="comment-{{ comment.id }}">
  <div class="margin-comment-question">
    <blockquote>{{ comment.content }}</blockquote>
  </div>

  {% if comment.response %}
  <div class="margin-comment-response">
    <p>{{ comment.response }}</p>
  </div>
  {% elif timed_out %}
  <div class="margin-comment-failed">
    Response generation failed. Delete this comment and try again.
  </div>
  {% else %}
  <div class="margin-comment-pending"
       hx-get="/comments/{{ comment.id }}"
       hx-trigger="every 3s"
       hx-target="closest .margin-comment"
       hx-swap="outerHTML">
    <span class="spinner"></span> Generating response…
  </div>
  {% endif %}

  {% if timed_out %}
  <button class="btn btn-sm btn-danger"
          hx-delete="/comments/{{ comment.id }}"
          hx-target="closest .margin-comment"
          hx-swap="outerHTML"
          hx-confirm="Delete this comment?">
    Delete
  </button>
  {% elif comment.status == 'OPEN' %}
  <div class="margin-comment-actions">
    <button class="btn btn-sm btn-resolve"
            hx-patch="/comments/{{ comment.id }}/resolve"
            hx-target="closest .margin-comment"
            hx-swap="outerHTML">
      Make permanent &amp; resolve
    </button>
    <button class="btn btn-sm btn-dismiss"
            hx-delete="/comments/{{ comment.id }}"
            hx-target="closest .margin-comment"
            hx-swap="outerHTML">
      Dismiss
    </button>
  </div>
  {% else %}
  <span class="resolved-badge">Resolved</span>
  {% endif %}
</div>
