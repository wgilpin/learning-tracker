{% extends "base.html" %}
{% block title %}Register — Learning Tracker{% endblock %}
{% block content %}
<div class="auth-container">
  <h1>Create account</h1>
  <form hx-post="/register" hx-target="body" method="post">
    <div class="form-group">
      <label for="invite_code">Invitation code</label>
      <input type="text" id="invite_code" name="invite_code" required autofocus placeholder="INV-…">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
    </div>
    <div class="form-group">
      <label for="password_confirm">Confirm password</label>
      <input type="password" id="password_confirm" name="password_confirm" required>
    </div>
    <button type="submit" class="btn btn-primary">Create account</button>
  </form>
  <p class="auth-footer">Already have an account? <a href="/login">Sign in</a>.</p>
</div>
{% endblock %}
