{% extends "base.html" %}
{% block title %}Login — Learning Tracker{% endblock %}
{% block content %}
<div class="auth-container">
  <h1>Sign in</h1>
  <form hx-post="/login" hx-target="body" method="post">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary">Sign in</button>
  </form>
  <p class="auth-footer">Need an account? Ask an administrator for an invitation code, then <a href="/register">register here</a>.</p>
</div>
{% endblock %}
