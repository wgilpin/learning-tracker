{% extends "base.html" %}

{% block title %}{{ topic.title }} — Learning Tracker{% endblock %}

{% block content %}
<div class="topic-detail">
  <div class="topic-detail-header">
    <h1>{{ topic.title }}</h1>
    {% if topic.description %}<p class="topic-description">{{ topic.description }}</p>{% endif %}
  </div>

  <div class="topic-detail-columns">
    <nav class="syllabus-nav" id="syllabus-panel">
      <p class="syllabus-nav-label">Syllabus</p>
      <div id="syllabus-items-list"
           hx-get="/topics/{{ topic.id }}/syllabus"
           hx-trigger="load">
        <div class="syllabus-generating">
          <span class="spinner"></span>
          <span>Loading…</span>
        </div>
      </div>
    </nav>

    <section class="reading-panel" id="reading-panel">
      <p class="reading-empty">Select a topic from the syllabus to start reading.</p>
    </section>
  </div>
</div>
{% endblock %}
