{% if items %}
<ul class="syllabus-tree" id="syllabus-tree-list">
  {% for item in items %}
  <li class="syllabus-section{% if item.id in ancestor_ids %} is-open{% endif %}" id="item-{{ item.id }}">
    <button class="syllabus-section-btn{% if item.id in ancestor_ids %} is-open{% endif %}"
            hx-get="/syllabus-items/{{ item.id }}/children{% if lesson_id %}?lesson={{ lesson_id }}&topic_slug={{ topic_slug }}{% elif topic_slug %}?topic_slug={{ topic_slug }}{% endif %}"
            hx-target="#children-{{ item.id }}"
            hx-swap="innerHTML"
            hx-on::before-request="const c=document.getElementById('children-{{ item.id }}');if(c.innerHTML.trim()){c.innerHTML='';event.preventDefault();}">
      <span class="syllabus-chevron">▶</span>
      <span class="syllabus-section-title">{{ item.title }}</span>
    </button>
    <ul class="syllabus-children" id="children-{{ item.id }}"
        {% if item.id in ancestor_ids %}
        hx-get="/syllabus-items/{{ item.id }}/children?lesson={{ lesson_id }}&topic_slug={{ topic_slug }}"
        hx-trigger="load"
        hx-swap="innerHTML"
        {% endif %}></ul>
  </li>
  {% endfor %}
</ul>
{% else %}
<div class="syllabus-generating"
     hx-get="/topics/{{ topic_id }}/syllabus"
     hx-trigger="every 3s"
     hx-target="#syllabus-items-list"
     hx-swap="innerHTML">
  <span class="spinner"></span>
  <span>Generating syllabus…</span>
</div>
{% endif %}
<div id="syllabus-warning"></div>
<div class="add-chapter-wrapper">
  <button class="btn-add-chapter"
          hx-get="/topics/{{ topic_id }}/syllabus-items/add-form"
          hx-target="#add-chapter-form-container"
          hx-swap="innerHTML">
    <span class="material-symbols-outlined">add</span>
    Add chapter
  </button>
  <div id="add-chapter-form-container"></div>
</div>
